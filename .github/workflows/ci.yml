name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  # ────────────────────────────────────────────────────────
  # Backend: lint + type-check
  # ────────────────────────────────────────────────────────
  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements/dev.txt

      - name: Install dependencies
        run: pip install -r requirements/dev.txt

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Mypy type check
        run: mypy apps/ --ignore-missing-imports

  # ────────────────────────────────────────────────────────
  # Backend: tests
  # ────────────────────────────────────────────────────────
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: raguser
          POSTGRES_PASSWORD: ragpassword
          POSTGRES_DB: ragchatbot_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U raguser -d ragchatbot_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://raguser:ragpassword@localhost:5432/ragchatbot_test
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: ci-test-secret-key-not-for-production
      DJANGO_SETTINGS_MODULE: config.settings.base
      GOOGLE_API_KEY: test-key-not-real
      DEBUG: "True"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements/dev.txt

      - name: Install dependencies
        run: pip install -r requirements/dev.txt

      - name: Run migrations
        run: python manage.py migrate --noinput

      - name: Run tests
        run: pytest -v --tb=short --cov=apps --cov-report=xml --cov-report=term-missing

      - name: Upload coverage
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: backend-coverage
          path: backend/coverage.xml

  # ────────────────────────────────────────────────────────
  # Frontend: lint + type-check
  # ────────────────────────────────────────────────────────
  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: ESLint
        run: npm run lint --if-present

  # ────────────────────────────────────────────────────────
  # Frontend: build
  # ────────────────────────────────────────────────────────
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    needs: frontend-lint
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: /api

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7

  # ────────────────────────────────────────────────────────
  # Docker: build images (no push on CI, just validate)
  # ────────────────────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend-lint, backend-test, frontend-build]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/backend.prod.Dockerfile
          push: false
          tags: rag-chatbot-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/frontend.prod.Dockerfile
          push: false
          tags: rag-chatbot-frontend:${{ github.sha }}
          build-args: VITE_API_URL=/api
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ────────────────────────────────────────────────────────
  # Security: dependency scanning
  # ────────────────────────────────────────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit Python dependencies
        working-directory: backend
        run: |
          pip-audit -r requirements/base.txt --desc --strict || {
            echo "::warning::Python dependency vulnerabilities found. Review the output above."
            echo "::notice::To allow specific vulnerabilities, add them to the ignore list in the workflow."
            exit 1
          }

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Audit npm dependencies
        working-directory: frontend
        run: |
          npm audit --audit-level=moderate || {
            echo "::warning::NPM dependency vulnerabilities found. Review the output above."
            echo "::notice::Use 'npm audit fix' to automatically fix fixable vulnerabilities."
            exit 1
          }

      - name: Check for secrets in code
        run: |
          # Scan for potential secrets in Python files
          if grep -r "SECRET_KEY\s*=\s*['\"]\([^'\"]\)['\"]" backend/ --include="*.py" 2>/dev/null | grep -v "os.environ.get" | grep -v "django-insecure"; then
            echo "::error::Found hardcoded secret keys in Python files."
            exit 1
          fi
          # Scan for API keys
          if grep -r "api[_-]key\s*=\s*['\"]" backend/ frontend/src/ --include="*.py" --include="*.ts" --include="*.tsx" 2>/dev/null | grep -v "os.environ.get" | grep -v "import.meta.env"; then
            echo "::warning::Found potential hardcoded API keys. Please review."
          fi

      - name: Summary
        if: always()
        run: |
          echo "## Security Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Python dependencies: Checked with pip-audit" >> $GITHUB_STEP_SUMMARY
          echo "- NPM dependencies: Checked with npm audit" >> $GITHUB_STEP_SUMMARY
          echo "- Secret scanning: Checked for hardcoded secrets" >> $GITHUB_STEP_SUMMARY
